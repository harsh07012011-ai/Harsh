const SUBSTAGES = [
  { key: "learn", label: "Learn", icon: "📘" },
  { key: "revision", label: "Revision", icon: "🔁" },
  { key: "test", label: "Test", icon: "✏️" }
];

const STORAGE_KEY = "ncert_progress_v2";
const TIMER_KEY = "ncert_running_timer_v1";
const SETTINGS_KEY = "ncert_settings_v1";
const SESSIONS_KEY = "ncert_sessions_v1";
const CUSTOM_KEY = "ncert_custom_topics_v1";
const PLANNER_KEY = "ncert_planner_tasks_v1";
const PLANNER_TIMER_KEY = "ncert_planner_timer_v1";
const SEED_SECS = 4440;
const SEED_DATE = "2026-06-30";
const SEED_FLAG = "seeded_p1_learn_jun30";
const GAP_DAYS = 20;
const BACKUP_REMIND_DAYS = 14;

const ALL_TOPICS = PLAN.flatMap((b) => b.topics.map((t) => ({ ...t, block: b })));
const TOTAL_PLANNED_HOURS = ALL_TOPICS.reduce((s, t) => s + t.hours, 0);
const TOTAL_PLAN_DAYS = PLAN.reduce((s, b) => s + b.days, 0);

/* ============================== PERSISTENCE ============================== */

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const state = raw ? JSON.parse(raw) : {};
    if (!state[SEED_FLAG]) {
      const cur = state["p1"] ?? {};
      const stages = { learn: 0, revision: 0, test: 0, ...(cur.stages ?? {}) };
      stages.learn += SEED_SECS;
      const days = { ...(cur.days ?? {}) };
      days[SEED_DATE] = (days[SEED_DATE] || 0) + SEED_SECS;
      state["p1"] = { ...cur, stages, days };
      state[SEED_FLAG] = true;
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
    }
    return state;
  } catch { return {}; }
}
function saveState(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {} }
function loadCustomData() {
  try {
    const raw = localStorage.getItem(CUSTOM_KEY);
    return raw ? JSON.parse(raw) : { overrides: {}, custom: [] };
  } catch { return { overrides: {}, custom: [] }; }
}
function saveCustomData(d) {
  try { localStorage.setItem(CUSTOM_KEY, JSON.stringify(d)); } catch {}
}
function loadRunningTimer() {
  try { const raw = localStorage.getItem(TIMER_KEY); return raw ? JSON.parse(raw) : null; } catch { return null; }
}
function saveRunningTimer(t) {
  try { if (t) localStorage.setItem(TIMER_KEY, JSON.stringify(t)); else localStorage.removeItem(TIMER_KEY); } catch {}
}
const DEFAULT_SETTINGS = {
  dailyGoalHours: 4, planStartDate: SEED_DATE, milestonesSeen: [], goalCelebratedDate: null,
  soundEnabled: true, vibrationEnabled: true,
  lastBackupAt: null, backupDismissedAt: null,
  lastGapNotifyWeekend: null
};
function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    return raw ? { ...DEFAULT_SETTINGS, ...JSON.parse(raw) } : { ...DEFAULT_SETTINGS };
  } catch { return { ...DEFAULT_SETTINGS }; }
}
function saveSettings(s) { try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch {} }
function loadSessions() {
  try { const raw = localStorage.getItem(SESSIONS_KEY); return raw ? JSON.parse(raw) : []; } catch { return []; }
}
function saveSessions(s) { try { localStorage.setItem(SESSIONS_KEY, JSON.stringify(s)); } catch {} }

}

}

/* ============================== HELPERS ============================== */

function todayKey() { return new Date().toISOString().slice(0, 10); }
function tomorrowKey() { const d = new Date(); d.setDate(d.getDate() + 1); return d.toISOString().slice(0, 10); }
function dateKeyFor(d) { return d.toISOString().slice(0, 10); }
function fmtHM(totalSeconds) {
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  if (h === 0) return `${m}m`;
  return `${h}h ${m}m`;
}
function fmtClock(totalSeconds) {
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  const s = Math.floor(totalSeconds % 60);
  return [h, m, s].map((v) => String(v).padStart(2, "0")).join(":");
}
function fmtDate(d) {
  return d.toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });
}
function addDays(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return d;
}

function aggregateDayTotals(progress) {
  const totals = {};
  for (const topic of ALL_TOPICS) {
    const td = progress[topic.id];
    if (!td || !td.days) continue;
    for (const [date, secs] of Object.entries(td.days)) totals[date] = (totals[date] || 0) + secs;
  }
  return totals;
}
function computeStreak(dayTotals) {
  let cursor = new Date();
  if (!(dayTotals[dateKeyFor(cursor)] > 0)) cursor.setDate(cursor.getDate() - 1);
  let streak = 0;
  while (dayTotals[dateKeyFor(cursor)] > 0) { streak++; cursor.setDate(cursor.getDate() - 1); }
  return streak;
}
function computeBestStreak(dayTotals) {
  const dates = Object.keys(dayTotals).filter((d) => dayTotals[d] > 0).sort();
  let best = 0, cur = 0, prev = null;
  for (const d of dates) {
    if (prev) {
      const diff = (new Date(d + "T00:00:00") - new Date(prev + "T00:00:00")) / 86400000;
      cur = diff === 1 ? cur + 1 : 1;
    } else cur = 1;
    best = Math.max(best, cur);
    prev = d;
  }
  return best;
}
function last7Dates() {
  const out = [];
  for (let i = 6; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate() - i); out.push(dateKeyFor(d)); }
  return out;
}
const GOAL_TIER_COLORS = ["#34D399", "#22D3EE", "#3B82F6", "#8B5CF6", "#F59E0B"];
function barColorForDay(secs, goalSecs) {
  if (secs <= 0) return "rgba(148,163,184,0.18)";
  if (goalSecs <= 0 || secs < goalSecs) return "rgba(148,163,184,0.35)";
  const overMinutes = (secs - goalSecs) / 60;
  const tier = Math.min(4, Math.floor(overMinutes / 15));
  return GOAL_TIER_COLORS[tier];
}
function avgPaceLastNDays(dayTotals, n) {
  let sum = 0;
  for (let i = 0; i < n; i++) { const d = new Date(); d.setDate(d.getDate() - i); sum += (dayTotals[dateKeyFor(d)] || 0); }
  return sum / n / 3600;
}
function estimateFinishDate(remainingHours, paceHrsPerDay) {
  if (paceHrsPerDay <= 0.01) return null;
  const daysNeeded = Math.ceil(remainingHours / paceHrsPerDay);
  const d = new Date();
  d.setDate(d.getDate() + daysNeeded);
  return d;
}
function lastStudiedDate(days) {
  const keys = Object.keys(days || {});
  if (keys.length === 0) return null;
  return keys.sort().at(-1);
}
function daysBetween(dateStr, refDate) {
  const d = new Date(dateStr + "T00:00:00");
  return Math.floor((refDate - d) / 86400000);
}
// A stable key identifying "this weekend" (the Saturday of the current week),
// so a gap notification only fires once per weekend even if checked multiple times.
function currentWeekendKey() {
  const now = new Date();
  const day = now.getDay(); // 0 Sun .. 6 Sat
  if (day !== 0 && day !== 6) return null;
  const sat = new Date(now);
  sat.setDate(now.getDate() - (day === 0 ? 1 : 0));
  return dateKeyFor(sat);
}
function expectedHoursByToday(planStartDate) {
  const start = new Date(planStartDate + "T00:00:00");
  const now = new Date();
  const daysElapsed = Math.max(0, Math.floor((now - start) / 86400000) + 1);
  const frac = Math.min(1, Math.max(0, daysElapsed / TOTAL_PLAN_DAYS));
  return TOTAL_PLANNED_HOURS * frac;
}

function buildMilestones(totalSpentSecs, dayTotals, progress) {
  const pctDone = Math.round((totalSpentSecs / 3600) / TOTAL_PLANNED_HOURS * 100);
  const streak = computeStreak(dayTotals);
  const totalHrs = totalSpentSecs / 3600;
  const list = [];
  [10, 25, 50, 75, 90, 100].forEach((p) =>
    list.push({ id: `pct-${p}`, label: `${p}% syllabus complete`, icon: "📈", done: pctDone >= p }));
  PLAN.forEach((b) => {
    const blockDone = b.topics.every((t) => progress[t.id]?.done);
    list.push({ id: `block-${b.block}`, label: `${b.subject} lane complete`, icon: b.icon, done: blockDone });
  });
  [3, 7, 14, 30, 60, 100].forEach((s) =>
    list.push({ id: `streak-${s}`, label: `${s}-day streak`, icon: "🔥", done: streak >= s }));
  [25, 50, 100, 200, 400].forEach((h) =>
    list.push({ id: `hours-${h}`, label: `${h} hours studied`, icon: "⏱️", done: totalHrs >= h }));
  return list;
}

const THEMES = {

    pageBg: "#0b1d2e",
    bgGradient: "linear-gradient(180deg, #0b1d2e 0%, #0e2a3d 28%, #143a40 55%, #1a4a3a 78%, #16331f 100%)",
    veil: "linear-gradient(180deg, rgba(2,8,14,0.55) 0%, rgba(2,8,14,0.25) 20%, rgba(2,8,14,0.55) 70%, rgba(2,8,14,0.85) 100%)",
    cardBg: "rgba(12,28,22,0.55)", cardBorder: "rgba(255,255,255,0.08)",

/* ============================== SMALL UI PARTS ============================== */

function RadialProgress({ pct, color, size = 52, stroke = 4 }) {
  const r = (size - stroke * 2) / 2;
  const circ = 2 * Math.PI * r;
  const dash = circ * (Math.min(100, Math.max(0, pct)) / 100);
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth={stroke} />
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{ transition: "stroke-dasharray 0.5s ease" }} />
    </svg>
  );
}

function Card({ children, style, theme }) {
  const th = theme || THEMES.dark;
  return (
    <div style={{
      borderRadius: 16, background: th.cardBg, border: `1px solid ${th.cardBorder}`,
      backdropFilter: "blur(6px)", padding: "16px 18px", ...style
    }}>{children}</div>
  );
}
function CardTitle({ icon, children, right, theme }) {
  const th = theme || THEMES.dark;
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
      <p style={{ margin: 0, fontSize: 12, color: th.textMuted, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1 }}>
        {icon} {children}
      </p>
      {right}
    </div>
  );
}

function Confetti({ active }) {
  const pieces = useMemo(() => {
    const colors = ["#60A5FA", "#34D399", "#FBBF24", "#F472B6", "#A78BFA"];
    return Array.from({ length: 26 }, (_, i) => ({
      id: i, left: Math.random() * 100, delay: Math.random() * 0.4,
      color: colors[i % colors.length], size: 6 + Math.random() * 6
    }));
  }, [active]);
  if (!active) return null;
  return (
    <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 200, overflow: "hidden" }}>
      {pieces.map((p) => (
        <div key={p.id} style={{
          position: "absolute", top: 0, left: `${p.left}%`, width: p.size, height: p.size * 1.6,
          background: p.color, borderRadius: 2, animation: `confetti-fall 1.6s ease-in ${p.delay}s forwards`
        }} />
      ))}
    </div>
  );
}

function Toast({ message }) {
  if (!message) return null;
  return (
    <div style={{
      position: "fixed", top: 14, left: "50%", zIndex: 201, transform: "translateX(-50%)",
      background: "rgba(15,36,28,0.95)", border: "1px solid rgba(167,139,250,0.4)", color: "#fff",
      padding: "10px 18px", borderRadius: 12, fontSize: 13, fontWeight: 700, boxShadow: "0 10px 30px rgba(0,0,0,0.4)",
      animation: "toast-in 0.3s ease", whiteSpace: "nowrap"
    }}>{message}</div>
  );
}

function ToggleRow({ label, checked, onChange }) {
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 0" }}>
      <span style={{ fontSize: 12.5, color: "#E2E8F0" }}>{label}</span>
      <button onClick={() => onChange(!checked)} style={{
        width: 42, height: 24, borderRadius: 20, border: "none", cursor: "pointer", position: "relative",
        background: checked ? "#34D399" : "rgba(255,255,255,0.15)", transition: "background 0.2s"
      }}>
        <span style={{
          position: "absolute", top: 3, left: checked ? 21 : 3, width: 18, height: 18, borderRadius: "50%",
          background: "#fff", transition: "left 0.2s"
        }} />
      </button>
    </div>
  );
}

function CalendarHeatmap({ planStartDate, dayTotals, goalSecs, tooltip, setTooltip, cellSize, theme }) {
  const th = theme || THEMES.dark;
  const cell = cellSize || 11;
  const gap = Math.max(2, Math.round(cell * 0.18));
  const stride = cell + gap;
  const start = new Date(planStartDate + "T00:00:00");
  const endStr = dateKeyFor(addDays(planStartDate, TOTAL_PLAN_DAYS - 1));
  // Align to the Sunday on/before start so weeks are consistent columns
  const gridStart = new Date(start);
  gridStart.setDate(gridStart.getDate() - gridStart.getDay());
  const totalCells = TOTAL_PLAN_DAYS + start.getDay() + 6;
  const weeks = Math.ceil(totalCells / 7);
  const cells = [];
  for (let i = 0; i < weeks * 7; i++) {
    const d = new Date(gridStart);
    d.setDate(d.getDate() + i);
    cells.push(dateKeyFor(d));
  }
  const months = [];
  let lastMonth = null;
  for (let w = 0; w < weeks; w++) {
    const d = new Date(gridStart);
    d.setDate(d.getDate() + w * 7);
    const label = d.toLocaleDateString("en-IN", { month: "short" });
    if (label !== lastMonth) { months.push({ w, label }); lastMonth = label; }
  }
  return (
    <div style={{ overflowX: "auto", paddingBottom: 6 }}>
      <div style={{ position: "relative", width: weeks * stride, height: 12, marginBottom: 2 }}>
        {months.map((m) => (
          <span key={m.w} style={{ position: "absolute", left: m.w * stride, fontSize: 9, color: th.textDim }}>{m.label}</span>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateRows: `repeat(7, ${cell}px)`, gridAutoFlow: "column", gap, width: weeks * stride }}>
        {cells.map((day) => {
          const secs = dayTotals[day] || 0;
          const inPlan = day >= planStartDate && day <= endStr;
          const color = !inPlan ? "transparent" : barColorForDay(secs, goalSecs);
          return (
            <div key={day} onClick={() => inPlan && setTooltip(tooltip === day ? null : day)}
              title={inPlan ? `${day}: ${fmtHM(secs)}` : ""}
              style={{ width: cell, height: cell, borderRadius: 2, background: color, cursor: inPlan ? "pointer" : "default" }} />
          );
        })}
      </div>
      {tooltip && (

/* ============================== SOUND ============================== */

let _audioCtx = null;
function getAudioCtx() {
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if (!Ctx) return null;
  if (!_audioCtx) _audioCtx = new Ctx();
  if (_audioCtx.state === "suspended") _audioCtx.resume().catch(() => {});
  return _audioCtx;
}
function unlockAudioOnce() {
  const ctx = getAudioCtx();
  if (ctx && ctx.state === "suspended") ctx.resume().catch(() => {});
}
function playTone(freq, startOffset, duration, ctx, gainPeak) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = "sine";
  osc.frequency.value = freq;
  const t0 = ctx.currentTime + startOffset;
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(gainPeak, t0 + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(t0);
  osc.stop(t0 + duration + 0.05);
}
function playChime(kind) {
  const ctx = getAudioCtx();
  if (!ctx) return;
  try {
    if (kind === "milestone") {
      [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => playTone(f, i * 0.09, 0.5, ctx, 0.09));
    } else if (kind === "goal") {
      [659.25, 987.77].forEach((f, i) => playTone(f, i * 0.1, 0.4, ctx, 0.08));
    } else {
      [523.25, 659.25, 783.99].forEach((f, i) => playTone(f, i * 0.09, 0.45, ctx, 0.09));
    }
  } catch {}
}

  useEffect(() => {

    const handler = (e) => { if (runningTopic || runningPlannerId) { e.preventDefault(); e.returnValue = ""; } };

    return () => window.removeEventListener("beforeunload", handler);
  }, [runningTopic, runningPlannerId]);

    const d = progress[id] ?? {};
    return {
      stages: d.stages ?? { learn: 0, revision: 0, test: 0 },
      days: d.days ?? {},
      done: d.done ?? false,
      activeStage: d.activeStage ?? "learn",
      completedDate: d.completedDate ?? null
    };
  };
  const totalSecondsForTopic = (id) => {
    const t = getTopicData(id);
    return t.stages.learn + t.stages.revision + t.stages.test;
  };

  const requestNotifPermission = async () => {
    if (typeof Notification === "undefined") return "unsupported";
    if (Notification.permission === "default") {
      const res = await Notification.requestPermission();
      setNotifPermission(res);
      return res;
    }
    setNotifPermission(Notification.permission);
    return Notification.permission;
  };

  const showTimerNotification = async (topicTitle, stageLabel, startTimestamp) => {
    if (typeof Notification === "undefined" || Notification.permission !== "granted") return;
    if (!("serviceWorker" in navigator)) return;
    try {
      const reg = await navigator.serviceWorker.ready;
      const startedLabel = new Date(startTimestamp).toLocaleTimeString("en-IN", { hour: "numeric", minute: "2-digit" });
      reg.showNotification("⏱ " + stageLabel + " in progress", {
        body: `${topicTitle} · started ${startedLabel}`,
        tag: "active-timer",
        renotify: false,
        requireInteraction: true,
        silent: true,
        icon: "icon-192.png",
        actions: [{ action: "stop", title: "■ Stop & save" }],
        data: { type: "active-timer" }
      });
    } catch {}
  };
  const clearTimerNotification = async () => {
    if (!("serviceWorker" in navigator)) return;
    try {
      const reg = await navigator.serviceWorker.ready;
      const notifs = await reg.getNotifications({ tag: "active-timer" });
      notifs.forEach((n) => n.close());
    } catch {}
  };

  // Listen for "stop" tapped from the notification (works while app is open/backgrounded)
  useEffect(() => {
    if (!("serviceWorker" in navigator)) return;
    const handler = (event) => {
      if (event.data && event.data.type === "STOP_TIMER") stopTimerRef.current && stopTimerRef.current();
    };
    navigator.serviceWorker.addEventListener("message", handler);
    return () => navigator.serviceWorker.removeEventListener("message", handler);
  }, []);
  // If the app was reopened (from a fully-closed state) because "Stop" was tapped in
  // the notification, the URL carries ?stopTimer=1 — catch that on load too.
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    if (params.get("stopTimer") === "1") {
      stopTimerRef.current && stopTimerRef.current();
      params.delete("stopTimer");
      const clean = window.location.pathname + (params.toString() ? "?" + params.toString() : "");
      window.history.replaceState({}, "", clean);
    }
  }, []);

  const startTimer = (topicId, stage) => {
    if (runningTopic) return;
    const ts = Date.now();
    startTimestampRef.current = ts;
    saveRunningTimer({ topicId, stage, startTimestamp: ts });
    setRunningTopic(topicId);
    setRunningStage(stage);
    setElapsed(0);
    const topic = findTopicMeta(topicId);
    const stageLabel = SUBSTAGES.find((s) => s.key === stage)?.label || stage;
    requestNotifPermission().then((perm) => {
      if (perm === "granted") showTimerNotification(topic ? topic.title : topicId, stageLabel, ts);
    });
  };

  const stopTimer = () => {
    if (!runningTopic) return;
    const secs = Math.floor((Date.now() - startTimestampRef.current) / 1000);
    const id = runningTopic;
    const stage = runningStage;
    const day = todayKey();
    const startedAt = startTimestampRef.current;
    setProgress((p) => {
      const cur = p[id] ?? {};
      const stages = { ...(cur.stages ?? { learn: 0, revision: 0, test: 0 }) };
      stages[stage] = (stages[stage] || 0) + secs;
      const days = { ...(cur.days ?? {}) };
      days[day] = (days[day] || 0) + secs;
      return { ...p, [id]: { ...cur, stages, days, activeStage: stage } };
    });
    if (secs >= 20) {
      const topic = findTopicMeta(id);
      setSessions((prev) => [
        { sid: `${startedAt}`, topicId: id, topicTitle: topic ? topic.title : id, stage, date: day, durationSec: secs, note: "" },
        ...prev
      ].slice(0, 200));
    }
    saveRunningTimer(null);
    startTimestampRef.current = null;
    setRunningTopic(null);
    setRunningStage(null);
    clearTimerNotification();
  };
  const stopTimerRef = useRef(stopTimer);
  useEffect(() => { stopTimerRef.current = stopTimer; });

  const addPlannerTask = () => {
    const title = newPlannerTask.title.trim();
    if (!title) return;
    const h = parseFloat(newPlannerTask.hours) || 0;
    const m = parseFloat(newPlannerTask.minutes) || 0;
    const allottedMin = Math.round(h * 60 + m);
    if (allottedMin <= 0) return;
    const task = { id: `task_${Date.now()}`, title, date: newPlannerTask.date || tomorrowKey(), allottedMin, createdAt: Date.now() };
    setPlannerTasks((prev) => [...prev, task]);
    setNewPlannerTask({ title: "", date: newPlannerTask.date || tomorrowKey(), hours: "", minutes: "" });
  };

  const deletePlannerTask = (id) => {
    if (runningPlannerId === id) return;
    setPlannerTasks((prev) => prev.filter((t) => t.id !== id));
  };

  const startPlannerTask = (id) => {
    if (runningPlannerId) return;
    const ts = Date.now();
    plannerStartRef.current = ts;
    savePlannerTimer({ taskId: id, startTimestamp: ts });
    setRunningPlannerId(id);
    setPlannerElapsed(0);
  };

  // Stopping a planner task means the work is finished — clear its data from the planner.
  const stopPlannerTask = () => {
    if (!runningPlannerId) return;
    const id = runningPlannerId;
    const task = plannerTasks.find((t) => t.id === id);
    savePlannerTimer(null);
    plannerStartRef.current = null;
    setRunningPlannerId(null);
    setPlannerElapsed(0);
    setPlannerTasks((prev) => prev.filter((t) => t.id !== id));
    if (task) celebrate(`✅ ${task.title} — done!`, "chapter", { confetti: false });
  };
  const stopPlannerTaskRef = useRef(stopPlannerTask);
  useEffect(() => { stopPlannerTaskRef.current = stopPlannerTask; });

  const toggleDone = (topicId) => {
    setProgress((p) => {
      const cur = p[topicId] ?? {};
      const newDone = !cur.done;
      if (newDone) {
        const topic = findTopicMeta(topicId);
        celebrate(`🎉 ${topic ? topic.title : "Chapter"} complete!`, "chapter");
      }
      return { ...p, [topicId]: { ...cur, done: newDone, completedDate: newDone ? todayKey() : cur.completedDate } };
    });
  };
  const setActiveStage = (topicId, stage) => {
    setProgress((p) => {
      const cur = p[topicId] ?? {};
      return { ...p, [topicId]: { ...cur, activeStage: stage } };
    });
  };
  const updateSessionNote = (sid, note) => {
    setSessions((prev) => prev.map((s) => (s.sid === sid ? { ...s, note } : s)));
  };

  // Remove a session's contribution from progress.stages / progress.days for its topic
  const removeContribution = (p, topicId, stage, date, secs) => {
    const cur = p[topicId] ?? {};
    const stages = { ...(cur.stages ?? { learn: 0, revision: 0, test: 0 }) };
    stages[stage] = Math.max(0, (stages[stage] || 0) - secs);
    const days = { ...(cur.days ?? {}) };
    days[date] = Math.max(0, (days[date] || 0) - secs);
    if (days[date] === 0) delete days[date];
    return { ...p, [topicId]: { ...cur, stages, days } };
  };
  const addContribution = (p, topicId, stage, date, secs) => {
    const cur = p[topicId] ?? {};
    const stages = { ...(cur.stages ?? { learn: 0, revision: 0, test: 0 }) };
    stages[stage] = (stages[stage] || 0) + secs;
    const days = { ...(cur.days ?? {}) };
    days[date] = (days[date] || 0) + secs;
    return { ...p, [topicId]: { ...cur, stages, days } };
  };

  const deleteSession = (sid) => {
    const s = sessions.find((x) => x.sid === sid);
    if (!s) return;
    setProgress((p) => removeContribution(p, s.topicId, s.stage, s.date, s.durationSec));
    setSessions((prev) => prev.filter((x) => x.sid !== sid));
  };

  const editSession = (sid, updates) => {
    const s = sessions.find((x) => x.sid === sid);
    if (!s) return;
    const next = { ...s, ...updates };
    setProgress((p) => {
      let np = removeContribution(p, s.topicId, s.stage, s.date, s.durationSec);
      np = addContribution(np, next.topicId, next.stage, next.date, next.durationSec);
      return np;
    });
    setSessions((prev) => prev.map((x) => (x.sid === sid ? next : x)));
  };

  const addManualSession = ({ topicId, stage, date, durationSec, note }) => {
    if (!topicId || !stage || !date || !durationSec || durationSec <= 0) return;
    const topic = findTopicMeta(topicId);
    setProgress((p) => addContribution(p, topicId, stage, date, durationSec));
    setSessions((prev) => [
      { sid: `manual-${Date.now()}`, topicId, topicTitle: topic ? topic.title : topicId, stage, date, durationSec, note: note || "", manual: true },
      ...prev
    ].slice(0, 200));
  };

  /* ---------- derived numbers ---------- */
  const allTopics = ALL_TOPICS;
  const totalTopics = allTopics.length;
  const doneTopics = allTopics.filter((t) => getTopicData(t.id).done).length;
  const totalSecondsSpent = allTopics.reduce((s, t) => s + totalSecondsForTopic(t.id) + (runningTopic === t.id ? elapsed : 0), 0);
  const totalHoursSpent = totalSecondsSpent / 3600;
  const remainingHoursTotal = Math.max(0, TOTAL_PLANNED_HOURS - totalHoursSpent);
  const globalPct = Math.round((doneTopics / totalTopics) * 100);

  const dayTotals = aggregateDayTotals(progress);
  if (runningTopic && elapsed > 0) {
    const today = todayKey();
    dayTotals[today] = (dayTotals[today] || 0) + elapsed;
  }
  const daysStudied = Object.keys(dayTotals).filter((d) => dayTotals[d] > 0).length;
  const todaySeconds = dayTotals[todayKey()] || 0;
  const sortedDays = Object.entries(dayTotals).sort((a, b) => b[0].localeCompare(a[0]));

  const currentStreak = computeStreak(dayTotals);
  const bestStreak = computeBestStreak(dayTotals);

  const goalSecs = settings.dailyGoalHours * 3600;
  const goalPct = goalSecs > 0 ? Math.min(100, Math.round((todaySeconds / goalSecs) * 100)) : 0;

  useEffect(() => {
    if (goalSecs > 0 && todaySeconds >= goalSecs && settings.goalCelebratedDate !== todayKey()) {
      celebrate("🎯 Daily goal reached!", "goal");
      setSettings((s) => ({ ...s, goalCelebratedDate: todayKey() }));
    }
    // eslint-disable-next-line
  }, [todaySeconds, goalSecs]);

  const pace7 = avgPaceLastNDays(dayTotals, 7);
  const pace14 = avgPaceLastNDays(dayTotals, 14);
  const estFinish = estimateFinishDate(remainingHoursTotal, pace7);
  const planEndDate = addDays(settings.planStartDate, TOTAL_PLAN_DAYS);
  const expectedHrsToday = expectedHoursByToday(settings.planStartDate);
  const paceDeltaHours = totalHoursSpent - expectedHrsToday;
  const onTrack = paceDeltaHours >= 0;

  useEffect(() => {
    const wk = currentWeekendKey();
    if (!wk || settings.lastGapNotifyWeekend === wk) return;
    const now = new Date();
    const stale = ALL_TOPICS.filter((t) => {
      const td = getTopicData(t.id);
      if (td.done) return false;
      const last = lastStudiedDate(td.days);
      if (!last) return false; // never started — not a "revisit" case
      return daysBetween(last, now) >= GAP_DAYS;
    });
    if (stale.length === 0) { setSettings((s) => ({ ...s, lastGapNotifyWeekend: wk })); return; }
    const title = stale.length === 1 ? "🔁 Time to revisit a topic" : `🔁 ${stale.length} topics need revisiting`;
    const body = stale.slice(0, 4).map((t) => t.title).join(", ") + (stale.length > 4 ? "…" : "");
    if (typeof Notification !== "undefined" && Notification.permission === "granted" && "serviceWorker" in navigator) {
      navigator.serviceWorker.ready.then((reg) => {
        reg.showNotification(title, { body, icon: "icon-192.png", tag: "gap-reminder" });
      }).catch(() => {});
    }
    celebrate(`${title} — it's been ${GAP_DAYS}+ days`, "default", { confetti: false });
    setSettings((s) => ({ ...s, lastGapNotifyWeekend: wk }));
    // eslint-disable-next-line
  }, [settings.lastGapNotifyWeekend]);

  const milestones = useMemo(() => buildMilestones(totalSecondsSpent, dayTotals, progress),
    [totalSecondsSpent, JSON.stringify(dayTotals), progress]);
  useEffect(() => {
    const achievedIds = milestones.filter((m) => m.done).map((m) => m.id);
    const newOnes = achievedIds.filter((id) => !settings.milestonesSeen.includes(id));
    if (newOnes.length > 0) {
      const first = milestones.find((m) => m.id === newOnes[0]);
      celebrate(`🏆 Milestone: ${first.label}`, "milestone");
      setSettings((s) => ({ ...s, milestonesSeen: [...new Set([...s.milestonesSeen, ...newOnes])] }));
    }
    // eslint-disable-next-line
  }, [milestones]);

  // monthly review
  const reviewDate = new Date();
  reviewDate.setMonth(reviewDate.getMonth() + reviewMonthOffset);
  const reviewMonthLabel = reviewDate.toLocaleDateString("en-IN", { month: "long", year: "numeric" });
  const reviewMonthKey = `${reviewDate.getFullYear()}-${String(reviewDate.getMonth() + 1).padStart(2, "0")}`;
  const prevReviewDate = new Date(reviewDate); prevReviewDate.setMonth(prevReviewDate.getMonth() - 1);
  const prevMonthKey = `${prevReviewDate.getFullYear()}-${String(prevReviewDate.getMonth() + 1).padStart(2, "0")}`;
  const hoursInMonth = (monthKey) =>
    Object.entries(dayTotals).filter(([d]) => d.startsWith(monthKey)).reduce((s, [, v]) => s + v, 0) / 3600;
  const daysStudiedInMonth = (monthKey) => Object.keys(dayTotals).filter((d) => d.startsWith(monthKey) && dayTotals[d] > 0).length;
  const topicsCompletedInMonth = (monthKey) =>
    allTopics.filter((t) => getTopicData(t.id).completedDate && getTopicData(t.id).completedDate.startsWith(monthKey)).length;
  const thisMonthHours = hoursInMonth(reviewMonthKey);
  const prevMonthHours = hoursInMonth(prevMonthKey);
  const monthDeltaPct = prevMonthHours > 0 ? Math.round(((thisMonthHours - prevMonthHours) / prevMonthHours) * 100) : null;

  // backup
  const doExport = () => {
    const payload = {
      exportedAt: new Date().toISOString(),
      progress: JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"),
      settings, sessions
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `foundation-plan-backup-${todayKey()}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    setSettings((s) => ({ ...s, lastBackupAt: Date.now() }));
  };
  const doImport = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data.progress) throw new Error("Missing progress data");
        setProgress(data.progress);
        setSettings({ ...DEFAULT_SETTINGS, ...(data.settings || {}) });
        setSessions(data.sessions || []);
        setImportMsg("Backup restored ✓");
        setTimeout(() => setImportMsg(""), 3000);
      } catch (err) {
        setImportMsg("Couldn't read that file — is it a Foundation Plan backup?");
        setTimeout(() => setImportMsg(""), 4000);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const generateShareImage = async () => {
    try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch {}
    const W = 1080, H = 1400, M = 80;
    const canvas = document.createElement("canvas");
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");

    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, "#F8FAFC");
    bgGrad.addColorStop(1, "#ECFDF5");
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);
    ctx.textBaseline = "alphabetic";

    ctx.fillStyle = "#64748B";
    ctx.font = "700 26px Inter, sans-serif";
    ctx.fillText("NCERT PCMB · FOUNDATION PLAN", M, 100);

    ctx.fillStyle = "#0F172A";
    ctx.font = "800 54px Inter, sans-serif";
    ctx.fillText("Harsh's Study Progress", M, 165);

    ctx.fillStyle = "#A78BFA";
    ctx.font = "800 190px Inter, sans-serif";
    ctx.fillText(`${globalPct}%`, M, 400);
    ctx.fillStyle = "#64748B";
    ctx.font = "500 30px Inter, sans-serif";
    ctx.fillText("of syllabus complete", M, 445);

    ctx.strokeStyle = "#E2E8F0";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(M, 500); ctx.lineTo(W - M, 500); ctx.stroke();

    const stats = [
      ["🔥", `${currentStreak}-day streak`, `personal best: ${bestStreak} days`],
      ["⏱", fmtHM(totalSecondsSpent), "studied in total"],
      ["🏁", estFinish ? fmtDate(estFinish) : "Need more data", "estimated finish date"],
      ["📘", `${doneTopics} / ${totalTopics}`, "chapters completed"]
    ];
    let y = 590;
    stats.forEach(([icon, big, small]) => {
      ctx.font = "44px sans-serif";
      ctx.fillStyle = "#0F172A";
      ctx.fillText(icon, M, y);
      ctx.font = "700 42px Inter, sans-serif";
      ctx.fillText(big, M + 70, y);
      ctx.font = "400 26px Inter, sans-serif";
      ctx.fillStyle = "#64748B";
      ctx.fillText(small, M + 70, y + 38);
      y += 130;
    });

    const totalSecsAll = Math.max(1, PLAN.reduce((s, b) => s + b.topics.reduce((ss, t) => ss + totalSecondsForTopic(t.id), 0), 0));
    const barY = H - 200, barW = W - M * 2, barH = 26;
    let x = M;
    PLAN.forEach((b) => {
      const secs = b.topics.reduce((s, t) => s + totalSecondsForTopic(t.id), 0);
      const w = (secs / totalSecsAll) * barW;
      ctx.fillStyle = b.color;
      ctx.fillRect(x, barY, Math.max(0, w), barH);
      x += w;
    });
    ctx.font = "500 24px Inter, sans-serif";
    ctx.fillStyle = "#94A3B8";
    ctx.fillText("⚡ Physics   🧪 Chemistry   ∫ Maths   🧬 Biology", M, barY + 60);

    ctx.font = "500 22px Inter, sans-serif";
    ctx.fillStyle = "#CBD5E1";
    ctx.fillText(new Date().toLocaleDateString("en-IN", { day: "numeric", month: "long", year: "numeric" }), M, H - 50);

    return new Promise((resolve) => canvas.toBlob((blob) => resolve(blob), "image/png"));
  };

  const shareProgressImage = async () => {
    const blob = await generateShareImage();
    if (!blob) return;
    const file = new File([blob], `foundation-plan-progress-${todayKey()}.png`, { type: "image/png" });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file], title: "My Foundation Plan progress" }); return; } catch { return; }
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = file.name;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    celebrate("Image downloaded ✓", "default");
  };

  const blockPct = (b) => {
    const done = b.topics.filter((t) => getTopicData(t.id).done).length;
    return Math.round((done / b.topics.length) * 100);
  };

  const [customData, setCustomData] = useState(loadCustomData());
  useEffect(() => { saveCustomData(customData); }, [customData]);

  // Merges a static plan topic with any saved hours/days override
  const effTopic = (topic) => {
    const ov = customData.overrides[topic.id];
    if (!ov) return topic;
    const hours = Number.isFinite(ov.hours) && ov.hours > 0 ? ov.hours : topic.hours;
    const days = Number.isFinite(ov.days) && ov.days > 0 ? ov.days : topic.days;
    return { ...topic, hours, days };
  };
  // Looks up a topic (built-in or custom) by id, with overrides applied
  const findTopicMeta = (topicId) => {
    const base = ALL_TOPICS.find((t) => t.id === topicId);
    if (base) return effTopic(base);
    return customData.custom.find((t) => t.id === topicId) || null;
  };
  const topicsForBlock = (blockIndex) => {
    const built = PLAN[blockIndex].topics.map(effTopic);
    const extra = customData.custom.filter((t) => t.blockIndex === blockIndex);
    return [...built, ...extra];
  };
  const saveTopicOverride = (topicId, updates) => {
    const isCustom = customData.custom.some((t) => t.id === topicId);
    if (isCustom) {
      setCustomData((d) => ({ ...d, custom: d.custom.map((t) => (t.id === topicId ? { ...t, ...updates } : t)) }));
    } else {
      setCustomData((d) => ({ ...d, overrides: { ...d.overrides, [topicId]: { ...d.overrides[topicId], ...updates } } }));
    }
  };
  const addCustomTopic = ({ blockIndex, title, cls, hours, days, focus }) => {
    if (!title || !hours || !days) return;
    const id = `custom-${Date.now()}`;
    setCustomData((d) => ({ ...d, custom: [...d.custom, { id, blockIndex, num: "＋", title, cls: cls || "Extra", hours: Number(hours), days: Number(days), focus: focus || "", isCustom: true }] }));
    return id;
  };
  const deleteCustomTopic = (topicId) => {
    setCustomData((d) => ({ ...d, custom: d.custom.filter((t) => t.id !== topicId) }));
    setProgress((p) => { const np = { ...p }; delete np[topicId]; return np; });
  };

  const th = THEMES.dark;

  const totalDaysSaved = useMemo(() => {
    return ALL_TOPICS.reduce((sum, t) => {
      const td = getTopicData(t.id);
      if (!td.done) return sum;
      const studiedDays = Object.keys(td.days || {}).length;
      if (studiedDays === 0) return sum;
      return sum + (t.days - studiedDays);
    }, 0);
    // eslint-disable-next-line
  }, [progress]);

  const staleTopicsPreview = useMemo(() => {
    const now = new Date();
    return ALL_TOPICS.filter((t) => {
      const td = getTopicData(t.id);
      if (td.done) return false;
      const last = lastStudiedDate(td.days);
      return last && daysBetween(last, now) >= GAP_DAYS;
    }).map((t) => ({ id: t.id, title: t.title, gapDays: daysBetween(lastStudiedDate(getTopicData(t.id).days), now) }))
      .sort((a, b) => b.gapDays - a.gapDays).slice(0, 8);
    // eslint-disable-next-line
  }, [progress]);

  const daysSinceMs = (ts) => ts ? (Date.now() - ts) / 86400000 : Infinity;
  const showBackupReminder = daysStudied > 0
    && daysSinceMs(settings.lastBackupAt) >= BACKUP_REMIND_DAYS
    && daysSinceMs(settings.backupDismissedAt) >= BACKUP_REMIND_DAYS;

  const block = PLAN[activeBlock];
  const runningTopicMeta = runningTopic ? allTopics.find((t) => t.id === runningTopic) : null;
  const runningTopicTitle = runningTopicMeta ? runningTopicMeta.title : "";

  const week = last7Dates();
  const weekMax = Math.max(3600, ...week.map((d) => dayTotals[d] || 0));

  const tabBtnStyle = (active) => ({
    flex: 1, padding: "10px 0", borderRadius: 10, border: "none", cursor: "pointer",
    background: active ? "rgba(167,139,250,0.22)" : "transparent",
    color: active ? "#fff" : "#94a3b8", fontWeight: 700, fontSize: 13
  });

  return (
    <div style={{ position: "relative", minHeight: "100vh", paddingBottom: 40 }}>
      <NatureBackground theme={th} />
      <Confetti active={confettiOn} />
      <Toast message={celebration} />
      {manualLogOpen && (
        <ManualLogModal
          value={manualLog}
          onChange={setManualLog}

                  )}
                  <p style={{ margin: "8px 0 0", fontSize: 10, color: "#64748b" }}>Note: notifications fire reliably while the app is open or backgrounded. If it's fully force-closed, tapping "Stop" briefly reopens it to save your session correctly.</p>
                </div>
              </Card>

              <Card theme={th}>
                <CardTitle theme={th} icon="🔁">Revisit reminders</CardTitle>
                <p style={{ margin: 0, fontSize: 11.5, color: "#94a3b8" }}>
                  Every weekend, if a chapter you've started hasn't been touched in {GAP_DAYS}+ days, you'll get a nudge to revisit it — separate from finishing new material.
                </p>
                {staleTopicsPreview.length > 0 && (
                  <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 6 }}>
                    {staleTopicsPreview.map((t) => (
                      <div key={t.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 11.5, padding: "6px 10px", borderRadius: 8, background: "rgba(251,191,36,0.08)", border: "1px solid rgba(251,191,36,0.2)" }}>
                        <span style={{ color: "#E2E8F0" }}>{t.title}</span>
                        <span style={{ color: "#FBBF24", fontWeight: 700 }}>{t.gapDays}d ago</span>
                      </div>
                    ))}
                  </div>
                )}
              </Card>

              <Card theme={th}>
                <CardTitle theme={th} icon="⭐">This week's recap</CardTitle>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <div><p style={{ margin: 0, fontSize: 10, color: "#94a3b8" }}>Hours this week</p><p style={{ margin: "2px 0 0", fontSize: 18, fontWeight: 800, color: "#fff" }}>{fmtHM(week.reduce((s, d) => s + (dayTotals[d] || 0), 0))}</p></div>
                  <div><p style={{ margin: 0, fontSize: 10, color: "#94a3b8" }}>Days active</p><p style={{ margin: "2px 0 0", fontSize: 18, fontWeight: 800, color: "#34D399" }}>{week.filter((d) => (dayTotals[d] || 0) > 0).length}/7</p></div>
                  <div><p style={{ margin: 0, fontSize: 10, color: "#94a3b8" }}>Current streak</p><p style={{ margin: "2px 0 0", fontSize: 18, fontWeight: 800, color: "#FBBF24" }}>🔥 {currentStreak}d</p></div>
                  <div><p style={{ margin: 0, fontSize: 10, color: "#94a3b8" }}>Chapters done</p><p style={{ margin: "2px 0 0", fontSize: 18, fontWeight: 800, color: "#A78BFA" }}>{doneTopics}/{totalTopics}</p></div>
                  <div><p style={{ margin: 0, fontSize: 10, color: "#94a3b8" }}>Days saved overall</p><p style={{ margin: "2px 0 0", fontSize: 18, fontWeight: 800, color: totalDaysSaved >= 0 ? "#059669" : "#F87171" }}>{totalDaysSaved >= 0 ? `⏱ ${totalDaysSaved}d` : `+${-totalDaysSaved}d`}</p></div>
                </div>
              </Card>

              <Card theme={th}>
                <CardTitle theme={th} icon="⚠️">Reset data</CardTitle>
                <p style={{ margin: "0 0 10px", fontSize: 11.5, color: "#94a3b8" }}>Wipes all progress, sessions and settings from this browser. Export a backup first — this can't be undone.</p>
                <button onClick={() => {
                  if (confirm("This will permanently delete all progress, sessions and settings on this device. Continue?")) {
                    localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(SETTINGS_KEY);
                    localStorage.removeItem(SESSIONS_KEY); localStorage.removeItem(TIMER_KEY);
                    window.location.reload();
                  }
                }} style={{ padding: "10px 16px", borderRadius: 10, border: "1px solid rgba(239,68,68,0.4)", background: "rgba(239,68,68,0.1)", color: "#F87171", fontWeight: 700, fontSize: 12.5, cursor: "pointer" }}>🗑 Reset all data</button>
              </Card>

            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
